<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tope Byte - Finanzas Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
      // Registro del Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW listo'))
            .catch(err => console.log('Error SW', err));
        });
      }
    </script>
</head>
<body>
    <div class="container">
        <header class="main-header" style="flex-direction: column; text-align: center;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1>Tope Byte Finanzas</h1>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; max-width: 320px; line-height: 1.4;">
                Gestiona tu presupuesto mensual de forma sencilla. Controla tus gastos en tiempo real y visualiza cuánto te queda disponible para acabar el mes sin sobresaltos.
            </p>
        </header>

        <div id="installContainer" style="display: none; margin-bottom: 20px;">
            <button id="btnInstall" style="background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);">
                <span style="font-size: 1.2rem;">📲</span> Instalar Aplicación Pro
            </button>
        </div>

        <div class="card budget-card">
            <label for="sueldo">Presupuesto / Sueldo Mensual (€)</label>
            <div class="input-row">
                <input type="number" id="sueldo" placeholder="Ej: 1200" onchange="guardarSueldo()">
                <div class="balance-info">
                    <small>Te quedan:</small>
                    <h3 id="restante">0.00€</h3>
                </div>
            </div>
        </div>

        <div class="card input-card">
            <div class="input-group">
                <input type="text" id="producto" placeholder="¿Qué compraste?">
            </div>
            <div class="input-row">
                <input type="number" id="cantidad" placeholder="Cant.">
                <input type="number" id="precio" placeholder="Precio €" step="0.01">
                <button id="btnAgregar" onclick="agregarGasto()">Añadir</button>
            </div>
        </div>

        <div class="total-badge">
            <small>Total Gastado</small>
            <h2><span id="totalMes">0.00</span>€</h2>
        </div>

        <div class="card list-card">
            <div id="listaGastos" class="gastos-container"></div>
        </div>

        <div class="card chart-card">
            <h3>Distribución</h3>
            <div id="containerBarras"></div>
            <button onclick="limpiarTodo()" class="btn-clear">Reiniciar Mes</button>
        </div>

        <footer style="text-align: center; padding: 20px 0; margin-top: 10px;">
            <p style="color: var(--text-muted); font-size: 0.8rem; opacity: 0.6; margin: 0;">
                Tope Byte - Finanzas Pro
            </p>
            <p style="color: var(--accent); font-size: 0.75rem; font-weight: bold; margin: 4px 0 0 0;">
                Versión 1.0.3
            </p>
        </footer>
    </div>

    <script>
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'block';
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installContainer.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installContainer.style.display = 'none';
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
