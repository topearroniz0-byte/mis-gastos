<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tope Byte - Finanzas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <img src="logo.png" alt="Logo" class="app-logo">
            <h1>Gastos Mensuales</h1>
        </header>

        <div class="card input-card">
            <div class="input-group">
                <input type="text" id="producto" placeholder="Nombre del producto">
            </div>
            <div class="input-row">
                <input type="number" id="cantidad" placeholder="Cant." min="1">
                <input type="number" id="precio" placeholder="Precio €" step="0.01">
                <button id="btnAgregar" onclick="agregarGasto()">Añadir</button>
            </div>
        </div>

        <div class="total-badge">
            <small>Total Acumulado</small>
            <h2><span id="totalMes">0.00</span>€</h2>
        </div>

        <div class="card list-card">
            <div id="listaGastos" class="gastos-container">
                </div>
        </div>

        <div class="card chart-card">
            <h3>Distribución de Gastos</h3>
            <div id="containerBarras"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
