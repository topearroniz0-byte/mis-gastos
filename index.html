<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tope Byte - Gastos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="stylesheet" href="style.css">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
</head>
<body>
    <div class="app-container">
        <img src="logo.png" alt="Tope Byte" class="watermark">

        <header>
            <h1>📊 Mis Gastos</h1>
        </header>

        <section class="input-panel">
            <div class="input-group">
                <input type="text" id="producto" placeholder="¿Qué compraste?">
            </div>
            <div class="input-row">
                <input type="number" id="cantidad" placeholder="Cant.">
                <input type="number" id="precio" placeholder="Precio (€)" step="0.01">
                <button onclick="agregarGasto()" class="btn-add">+</button>
            </div>
        </section>

        <section class="gastos-list" id="listaGastos">
            </section>

        <footer class="resumen-panel">
            <h2>Total Mes: <span id="totalMes">0.00</span> €</h2>
            <button onclick="limpiarTodo()" class="btn-clear">Limpiar Mes</button>
        </footer>

        <section class="chart-section">
            <h3>📈 Distribución</h3>
            <div id="containerBarras" class="chart-container"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
