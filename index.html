<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tope Byte - Gastos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="stylesheet" href="style.css">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;">
            <img src="logo.png" alt="Logo TOPE BYTE" style="max-width: 45px; height: auto;">
            <h1 style="font-size: 1.6rem; margin: 0; color: #e0e0e0;">Gastos Mensuales</h1>
        </header>
        
        <div class="input-section">
            <input type="text" id="producto" placeholder="Producto">
            <input type="number" id="cantidad" placeholder="Cant.">
            <input type="number" id="precio" placeholder="Precio (€)" step="0.01">
            <button onclick="agregarGasto()">+</button>
        </div>

        <div style="overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px;">
            <table id="tablaGastos">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Precio</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

        <div id="resumen">
            <h3>Total: <span id="totalMes">0.00</span> €</h3>
        </div>

        <div class="barras-section">
            <h3>📈 Gastos por producto</h3>
            <div id="containerBarras"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
